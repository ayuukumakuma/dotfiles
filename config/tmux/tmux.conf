# ====================
# General
# ====================
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g update-environment "SSH_AUTH_SOCK"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ====================
# Prefix
# ====================
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# ====================
# Key Bindings
# ====================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind Tab last-window

# ====================
# Popup
# ====================
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

# ====================
# Copy Mode (vi)
# ====================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ====================
# Plugins (TPM)
# ====================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

# After adding/updating plugins, press prefix + I to install via TPM.

# Pane styling
set -g window-style "bg=default,fg=#b8b8b8,dim"
set -g window-active-style "bg=default,fg=#4c4f69"
set -g pane-border-style "fg=#bcc0cc"
set -g pane-active-border-style "fg=#1e66f5,bold"

# Status bar
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-fg "#6c6f85"
set -g @tmux-dotbar-fg-current "#1e66f5"
set -g @tmux-dotbar-fg-session "#4c4f69"
set -g @tmux-dotbar-fg-prefix "#1e66f5"
set -g @tmux-dotbar-fg-prefix-text "#eff1f5"
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-bold-current-window true
set -g @tmux-dotbar-show-maximized-icon-for-all-tabs true

run '~/.config/tmux/scripts/dotbar.tmux'

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
